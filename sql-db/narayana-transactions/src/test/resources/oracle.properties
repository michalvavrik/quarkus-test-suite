quarkus.datasource.db-kind=oracle
quarkus.hibernate-orm.sql-load-script=oracle_import.sql
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.datasource.jdbc.telemetry=true
quarkus.otel.enabled=true
quarkus.application.name=narayanaTransactions

# Transaction manager recovery configuration
quarkus.transaction-manager.node-name=quarkus-qe
quarkus.transaction-manager.object-store.type=jdbc
quarkus.transaction-manager.object-store.datasource=object-store-ds
quarkus.transaction-manager.enable-recovery=true
quarkus.transaction-manager.object-store.create-table=true
quarkus.transaction-manager.object-store.table-prefix=quarkus_qe_

# Show the SQL queries
quarkus.log.category."org.hibernate.SQL".level=TRACE
quarkus.log.category."org.hibernate.SQL".min-level=TRACE

# Show the bound parameter values
quarkus.log.category."org.hibernate.type.descriptor.sql".level=TRACE
quarkus.log.category."org.hibernate.type.descriptor.sql".min-level=TRACE
quarkus.log.category."com.arjuna".min-level=TRACE
quarkus.log.category."com.arjuna".level=TRACE

quarkus.datasource.jdbc.transaction-isolation-level=read-committed
quarkus.transaction-manager.default-timeout=30

quarkus.datasource.jdbc.new-connection-sql=ALTER SESSION SET OPTIMIZER_MODE=ALL_ROWS
quarkus.datasource.xa=true
quarkus.transaction-manager.enable-one-phase-optimization=false
quarkus.datasource.jdbc.additional-jdbc-properties.oracle.jdbc.enableACSupport=false
